name: Publish doxygen image
on:
  push:
    paths: 
    - doxygen/**
jobs:
  push_to_registry:
    name: Push doxygen image to docker hub
    runs-on: ubuntu-latest
    steps:
      - name: check out repo
        uses: actions/checkout@v6
      - name: build container
        run: docker build -t ${{secrets.DOCKERHUB_USER}}/doxygen:latest doxygen
      - name: log in to docker
        uses: docker/login-action@v4.1.0
        with:
          username: ${{secrets.DOCKERHUB_USER}}
          password: ${{secrets.DOCKERHUB_PASS}}
      - name: push image
        run: docker image push doxygen:latest
